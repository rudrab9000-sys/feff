<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account - BDG Game</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: #1a1a1a; display: flex; justify-content: center; color: white; }
        .app-container { width: 375px; background: #111; min-height: 100vh; padding-bottom: 90px; }

        /* User Profile Header */
        .profile-header { background: linear-gradient(135deg, #ffc107, #ff9800); padding: 40px 20px; text-align: center; border-radius: 0 0 30px 30px; position: relative; }
        .user-avatar { font-size: 60px; background: white; width: 100px; height: 100px; display: flex; align-items: center; justify-content: center; border-radius: 50%; margin: 0 auto 15px; border: 4px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .user-info h2 { font-size: 20px; color: #000; font-weight: 800; }
        .user-info p { font-size: 13px; color: #333; font-weight: 600; margin-top: 5px; }

        /* Statistics Bar */
        .stats-bar { display: flex; justify-content: space-around; background: #222; margin: -20px 20px 20px; padding: 15px; border-radius: 15px; border: 1px solid #333; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .stat-item { text-align: center; }
        .stat-item h4 { font-size: 16px; color: #ffc107; }
        .stat-item p { font-size: 10px; color: #888; text-transform: uppercase; margin-top: 3px; }

        /* Menu List */
        .menu-container { padding: 0 15px; }
        .menu-item { background: #222; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; cursor: pointer; border: 1px solid #333; transition: 0.3s; text-decoration: none; color: white; }
        .menu-item:active { background: #333; transform: scale(0.98); }
        .menu-item i:first-child { width: 30px; font-size: 18px; color: #ffc107; }
        .menu-item span { flex: 1; font-size: 14px; font-weight: 500; }
        .menu-item .fa-chevron-right { font-size: 12px; color: #555; }

        /* Logout Button */
        .logout-btn { margin: 20px 15px; padding: 15px; background: #f44336; border-radius: 30px; text-align: center; font-weight: bold; cursor: pointer; box-shadow: 0 5px 15px rgba(244,67,54,0.3); }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 375px; background: #222; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; z-index: 1000; }
        .nav-item { text-align: center; color: #888; text-decoration: none; font-size: 11px; flex: 1; }
        .nav-item.active { color: #ffc107; }
        .nav-item i { font-size: 22px; margin-bottom: 4px; display: block; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="profile-header">
            <div class="user-avatar">👤</div>
            <div class="user-info">
                <h2 id="acc-phone">Loading...</h2>
                <p>UID: <span id="acc-uid">000000</span> | Level: 1</p>
            </div>
        </div>

        <div class="stats-bar">
            <div class="stat-item">
                <h4 id="stat-bal">₹0.00</h4>
                <p>Wallet</p>
            </div>
            <div class="stat-item">
                <h4>₹0.00</h4>
                <p>Winning</p>
            </div>
            <div class="stat-item">
                <h4>0</h4>
                <p>Orders</p>
            </div>
        </div>

        <div class="menu-container">
            <div class="menu-item">
                <i class="fa-solid fa-file-invoice-dollar"></i>
                <span>Betting Record</span>
                <i class="fa-solid fa-chevron-right"></i>
            </div>
            <div class="menu-item">
                <i class="fa-solid fa-clock-rotate-left"></i>
                <span>Deposit History</span>
                <i class="fa-solid fa-chevron-right"></i>
            </div>
            <div class="menu-item">
                <i class="fa-solid fa-money-bill-transfer"></i>
                <span>Withdraw History</span>
                <i class="fa-solid fa-chevron-right"></i>
            </div>
            <a href="https://t.me/your_telegram" class="menu-item">
                <i class="fa-solid fa-headset"></i>
                <span>Customer Support</span>
                <i class="fa-solid fa-chevron-right"></i>
            </a>
            <div class="menu-item">
                <i class="fa-solid fa-shield-halved"></i>
                <span>Privacy Policy</span>
                <i class="fa-solid fa-chevron-right"></i>
            </div>
        </div>

        <div class="logout-btn" onclick="handleLogout()">Logout</div>

        <nav class="bottom-nav">
            <a href="../lobby/index.html" class="nav-item"><i class="fa-solid fa-house"></i>Home</a>
            <a href="../activity/index.html" class="nav-item"><i class="fa-solid fa-gift"></i>Activity</a>
            <a href="../wallet/index.html" class="nav-item"><i class="fa-solid fa-wallet"></i>Wallet</a>
            <a href="index.html" class="nav-item active"><i class="fa-solid fa-user"></i>Account</a>
        </nav>
    </div>

    <script>
        // ইউজার ডাটা লোড করার লজিক
        window.onload = function() {
            const userData = JSON.parse(localStorage.getItem('userData'));
            const balance = localStorage.getItem('bal') || "0.00";

            if(userData) {
                document.getElementById('acc-phone').innerText = userData.phone;
                document.getElementById('acc-uid').innerText = Math.floor(100000 + Math.random() * 900000); // Random UID
                document.getElementById('stat-bal').innerText = "₹" + parseFloat(balance).toFixed(2);
            } else {
                location.href = "../auth/login.html"; // লগইন না থাকলে পাঠিয়ে দেবে
            }
        };

        function handleLogout() {
            if(confirm("Are you sure you want to logout?")) {
                localStorage.removeItem('userData'); // ইউজারের সেশন ডিলিট করা
                location.href = "../auth/login.html";
            }
        }
    </script>
</body>
</html>
