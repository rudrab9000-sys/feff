<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BDG Official - Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #1a1a1a; color: white; display: flex; justify-content: center; }
        .app-container { width: 375px; background: #111; min-height: 100vh; padding-bottom: 80px; }

        /* Banner */
        .banner { width: 100%; height: 180px; background: linear-gradient(45deg, #d32f2f, #ffc107); display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; }

        /* Info Section */
        .user-info { padding: 15px; display: flex; justify-content: space-between; align-items: center; background: #222; margin: 10px; border-radius: 10px; }
        .balance-box h2 { color: #ffc107; font-size: 20px; }
        .balance-box p { font-size: 12px; color: #888; }

        /* Game Grid */
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .game-card { background: #222; border-radius: 15px; padding: 20px; text-align: center; border: 1px solid #333; cursor: pointer; transition: 0.3s; text-decoration: none; color: white; }
        .game-card:active { transform: scale(0.95); }
        .game-card i { font-size: 40px; margin-bottom: 10px; color: #ffc107; }
        .game-card h3 { font-size: 16px; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 375px; background: #222; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; }
        .nav-item { text-align: center; color: #888; text-decoration: none; font-size: 11px; flex: 1; }
        .nav-item.active { color: #ffc107; }
        .nav-item i { font-size: 22px; margin-bottom: 4px; display: block; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="banner">BDG GAME OFFICIAL</div>

        <div class="user-info">
            <div class="balance-box">
                <p>Total Balance</p>
                <h2>₹ <span id="main-bal">0.00</span></h2>
            </div>
            <a href="wallet/index.html" style="background:#ffc107; color:black; padding:8px 15px; border-radius:5px; text-decoration:none; font-weight:bold; font-size:12px;">Deposit</a>
        </div>

        <div class="game-grid">
            <a href="wingo/index.html" class="game-card">
                <i class="fa-solid fa-dice"></i>
                <h3>Win Go</h3>
                <p style="font-size:10px; color:#555;">1 Min / 3 Min</p>
            </a>
            <div class="game-card" onclick="alert('Coming Soon!')">
                <i class="fa-solid fa-slot-machine"></i>
                <h3>Slots</h3>
                <p style="font-size:10px; color:#555;">Popular</p>
            </div>
            <div class="game-card" onclick="alert('Coming Soon!')">
                <i class="fa-solid fa-cards-blank"></i>
                <h3>Casino</h3>
                <p style="font-size:10px; color:#555;">Live Dealer</p>
            </div>
            <div class="game-card" onclick="alert('Coming Soon!')">
                <i class="fa-solid fa-trophy"></i>
                <h3>Sports</h3>
                <p style="font-size:10px; color:#555;">Cricket/Football</p>
            </div>
        </div>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-item active"><i class="fa-solid fa-house"></i>Home</a>
            <a href="activity/index.html" class="nav-item"><i class="fa-solid fa-gift"></i>Activity</a>
            <a href="wallet/index.html" class="nav-item"><i class="fa-solid fa-wallet"></i>Wallet</a>
            <a href="account/index.html" class="nav-item"><i class="fa-solid fa-user"></i>Account</a>
        </nav>
    </div>

    <script>
        function checkUser() {
            // ইউজারের ডাটা চেক করা
            const user = JSON.parse(localStorage.getItem('userData'));
            if(!user) {
                // যদি লগইন না থাকে তবে লগইন পেজে পাঠাবে
                window.location.href = "auth/login.html"; 
            } else {
                // ব্যালেন্স লোড করা
                let bal = localStorage.getItem('bal') || "0.00";
                document.getElementById('main-bal').innerText = parseFloat(bal).toFixed(2);
            }
        }

        window.onload = checkUser;
        // প্রতি ৫ সেকেন্ডে ব্যালেন্স আপডেট হবে (অ্যাডমিন এপ্রুভ করলে যাতে দেখা যায়)
        setInterval(checkUser, 5000);
    </script>
</body>
</html>
