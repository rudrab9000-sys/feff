<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinGo Master - Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: #1a1a1a; color: white; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 375px; background: #1a1a1a; min-height: 100vh; position: relative; }

        /* Loader */
        #loading-screen { position: fixed; top: 0; width: 375px; height: 100%; background: #1a1a1a; display: flex; justify-content: center; align-items: center; z-index: 1000; }

        /* Auth Screen Styling */
        #auth-screen { padding: 30px; display: none; flex-direction: column; justify-content: center; height: 100vh; }
        .auth-box { background: #222; padding: 25px; border-radius: 20px; border: 1px solid #333; }
        h2 { text-align: center; margin-bottom: 20px; color: #ffc107; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #444; background: #333; color: white; outline: none; }
        .btn-main { width: 100%; padding: 12px; border: none; border-radius: 10px; background: #ffc107; color: #000; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .toggle-auth { text-align: center; margin-top: 15px; font-size: 14px; color: #aaa; cursor: pointer; }

        /* Lobby Styling */
        #lobby-screen { display: none; padding-bottom: 70px; }
        .lobby-header { background: #222; padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .user-info i { font-size: 24px; color: #ffc107; }
        
        .promo-banner { margin: 15px; height: 120px; background: linear-gradient(45deg, #d32f2f, #ffc107); border-radius: 15px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; }
        
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .game-card { background: #222; border-radius: 15px; padding: 20px; text-align: center; border: 1px solid #333; cursor: pointer; }
        .game-card i { font-size: 40px; color: #ffc107; margin-bottom: 10px; }

        .nav-bar { position: fixed; bottom: 0; width: 375px; background: #222; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; }
        .nav-item { color: #888; text-align: center; font-size: 12px; }
        .nav-item.active { color: #ffc107; }
    </style>
</head>
<body>

    <div class="container">
        <div id="loading-screen"><i class="fas fa-spinner fa-spin fa-2x" style="color: #ffc107;"></i></div>

        <div id="auth-screen">
            <div class="auth-box">
                <h2 id="auth-title">Login</h2>
                <input type="email" id="email" placeholder="Email Address">
                <input type="password" id="password" placeholder="Password">
                <button class="btn-main" id="auth-btn" onclick="handleAuth()">Login</button>
                <p class="toggle-auth" onclick="toggleAuth()">Don't have an account? Register</p>
            </div>
        </div>

        <div id="lobby-screen">
            <header class="lobby-header">
                <div class="user-info">
                    <i class="fa-solid fa-circle-user"></i>
                    <div>
                        <p id="user-id-display" style="font-size: 11px; color: #aaa;">ID: --</p>
                        <h4 id="user-balance-display">₹ 0.00</h4>
                    </div>
                </div>
                <button onclick="logout()" style="background: none; border: none; color: #f44336;"><i class="fa-solid fa-right-from-bracket fa-lg"></i></button>
            </header>

            <div class="promo-banner">WINGO 30S LIVE</div>

            <div class="game-grid">
                <div class="game-card" onclick="location.href='wingo.html'">
                    <i class="fa-solid fa-gamepad"></i>
                    <h3>WinGo 30s</h3>
                    <p style="font-size: 10px; color: #4caf50;">● Online</p>
                </div>
                <div class="game-card" onclick="alert('Coming Soon')">
                    <i class="fa-solid fa-dice"></i>
                    <h3>TrX Hash</h3>
                </div>
            </div>

            <nav class="nav-bar">
                <div class="nav-item active"><i class="fa-solid fa-house"></i><br>Home</div>
                <div class="nav-item"><i class="fa-solid fa-wallet"></i><br>Wallet</div>
                <div class="nav-item"><i class="fa-solid fa-user"></i><br>Profile</div>
            </nav>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD2It_WJyq3VzjGFE0tqlm_Wac7CHEb2LI",
            authDomain: "bdg-game-35af2.firebaseapp.com",
            databaseURL: "https://bdg-game-35af2-default-rtdb.firebaseio.com",
            projectId: "bdg-game-35af2",
            storageBucket: "bdg-game-35af2.firebasestorage.app",
            messagingSenderId: "1040854462703",
            appId: "1:1040854462703:web:4875b19f420c57dafbeb1a"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        let isLoginMode = true;

        function toggleAuth() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "Login" : "Register";
            document.getElementById('auth-btn').innerText = isLoginMode ? "Login" : "Register";
            document.querySelector('.toggle-auth').innerText = isLoginMode ? "Don't have an account? Register" : "Already have an account? Login";
        }

        async function handleAuth() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            if(!email || !password) return alert("Please fill all fields");

            try {
                if (isLoginMode) {
                    await auth.signInWithEmailAndPassword(email, password);
                } else {
                    const res = await auth.createUserWithEmailAndPassword(email, password);
                    const generatedUID = "UID" + Math.floor(100000 + Math.random() * 900000);
                    // ডাটাবেসে ইউজার ডাটা তৈরি
                    await database.ref('users/' + res.user.uid).set({
                        email: email,
                        uID: generatedUID,
                        balance: 0.00
                    });
                }
            } catch (error) {
                alert("Error: " + error.message);
            }
        }

        // লগইন স্ট্যাটাস চেক
        auth.onAuthStateChanged(user => {
            const loading = document.getElementById('loading-screen');
            const authScreen = document.getElementById('auth-screen');
            const lobbyScreen = document.getElementById('lobby-screen');

            if (user) {
                authScreen.style.display = 'none';
                lobbyScreen.style.display = 'block';
                loadUserData(user.uid);
            } else {
                authScreen.style.display = 'flex';
                lobbyScreen.style.display = 'none';
            }
            loading.style.display = 'none'; // Firebase চেক শেষ হলে লোডার বন্ধ
        });

        function loadUserData(uid) {
            database.ref('users/' + uid).on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    document.getElementById('user-id-display').innerText = "ID: " + data.uID;
                    document.getElementById('user-balance-display').innerText = "₹ " + parseFloat(data.balance).toFixed(2);
                    localStorage.setItem('myUID', uid); // wingo.html এর জন্য সঠিক UID সেভ
                } else {
                    // যদি ডাটা না থাকে (পুরানো ইউজারদের জন্য)
                    const genUID = "UID" + Math.floor(100000 + Math.random() * 900000);
                    database.ref('users/' + uid).update({ uID: genUID, balance: 0.00 });
                }
            });
        }

        function logout() {
            if(confirm("Are you sure you want to logout?")) {
                auth.signOut();
            }
        }
    </script>
</body>
</html>
