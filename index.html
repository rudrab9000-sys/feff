<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinGo Master - Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: #1a1a1a; color: white; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 375px; background: #1a1a1a; min-height: 100vh; position: relative; }

        /* Auth Screen Styling */
        #auth-screen { padding: 30px; display: flex; flex-direction: column; justify-content: center; height: 100vh; }
        .auth-box { background: #222; padding: 25px; border-radius: 20px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { text-align: center; margin-bottom: 20px; color: #ffc107; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #444; background: #333; color: white; outline: none; }
        .btn-main { width: 100%; padding: 12px; border: none; border-radius: 10px; background: #ffc107; color: #000; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .toggle-auth { text-align: center; margin-top: 15px; font-size: 14px; color: #aaa; cursor: pointer; }

        /* Lobby Styling */
        #lobby-screen { display: none; padding-bottom: 70px; }
        .lobby-header { background: #222; padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .user-info i { font-size: 24px; color: #ffc107; }
        
        .promo-banner { margin: 15px; height: 150px; background: linear-gradient(45deg, #d32f2f, #ffc107); border-radius: 15px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; text-shadow: 2px 2px 5px rgba(0,0,0,0.3); }
        
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .game-card { background: #222; border-radius: 15px; padding: 20px; text-align: center; border: 1px solid #333; cursor: pointer; transition: 0.3s; }
        .game-card:active { transform: scale(0.95); }
        .game-card i { font-size: 40px; color: #ffc107; margin-bottom: 10px; }
        .game-card h3 { font-size: 16px; }

        .nav-bar { position: fixed; bottom: 0; width: 375px; background: #222; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; }
        .nav-item { color: #888; text-align: center; font-size: 12px; cursor: pointer; }
        .nav-item.active { color: #ffc107; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 3px; }
    </style>
</head>
<body>

    <div class="container">
        <div id="auth-screen">
            <div class="auth-box">
                <h2 id="auth-title">Login</h2>
                <input type="email" id="email" placeholder="Email Address">
                <input type="password" id="password" placeholder="Password">
                <button class="btn-main" id="auth-btn" onclick="handleAuth()">Login</button>
                <p class="toggle-auth" onclick="toggleAuth()">Don't have an account? Register</p>
            </div>
        </div>

        <div id="lobby-screen">
            <header class="lobby-header">
                <div class="user-info">
                    <i class="fa-solid fa-circle-user"></i>
                    <div>
                        <p id="user-id-display" style="font-size: 12px; color: #aaa;">ID: Loading...</p>
                        <h4 id="user-balance-display">₹ 0.00</h4>
                    </div>
                </div>
                <button onclick="logout()" style="background: none; border: none; color: #f44336; font-size: 18px;"><i class="fa-solid fa-right-from-bracket"></i></button>
            </header>

            <div class="promo-banner">
                WIN BIG ON WINGO 30S
            </div>

            <div class="game-grid">
                <div class="game-card" onclick="location.href='wingo.html'">
                    <i class="fa-solid fa-gamepad"></i>
                    <h3>WinGo 30s</h3>
                    <p style="font-size: 10px; color: #4caf50;">● Live Now</p>
                </div>
                <div class="game-card">
                    <i class="fa-solid fa-dice"></i>
                    <h3>TrX Hash</h3>
                    <p style="font-size: 10px; color: #aaa;">Coming Soon</p>
                </div>
                <div class="game-card">
                    <i class="fa-solid fa-trophy"></i>
                    <h3>Daily Tasks</h3>
                </div>
                <div class="game-card">
                    <i class="fa-solid fa-envelope-open-text"></i>
                    <h3>Promotions</h3>
                </div>
            </div>

            <nav class="nav-bar">
                <div class="nav-item active"><i class="fa-solid fa-house"></i>Home</div>
                <div class="nav-item" onclick="alert('Coming Soon')"><i class="fa-solid fa-wallet"></i>Wallet</div>
                <div class="nav-item" onclick="alert('Contact Support')"><i class="fa-solid fa-headset"></i>Support</div>
                <div class="nav-item" onclick="alert('Profile Settings')"><i class="fa-solid fa-user"></i>Profile</div>
            </nav>
        </div>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyD2It_WJyq3VzjGFE0tqlm_Wac7CHEb2LI",
            authDomain: "bdg-game-35af2.firebaseapp.com",
            databaseURL: "https://bdg-game-35af2-default-rtdb.firebaseio.com",
            projectId: "bdg-game-35af2",
            storageBucket: "bdg-game-35af2.firebasestorage.app",
            messagingSenderId: "1040854462703",
            appId: "1:1040854462703:web:4875b19f420c57dafbeb1a"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        let isLoginMode = true;

        function toggleAuth() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "Login" : "Register";
            document.getElementById('auth-btn').innerText = isLoginMode ? "Login" : "Register";
            document.querySelector('.toggle-auth').innerText = isLoginMode ? "Don't have an account? Register" : "Already have an account? Login";
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if(!email || !password) return alert("Please fill all fields");

            try {
                if (isLoginMode) {
                    await auth.signInWithEmailAndPassword(email, password);
                } else {
                    const res = await auth.createUserWithEmailAndPassword(email, password);
                    // নতুন ইউজার রেজিস্টার করলে ডাটাবেসে ব্যালেন্স সেট করা
                    const uID = "UID" + Math.floor(1000 + Math.random() * 9000);
                    await database.ref('users/' + res.user.uid).set({
                        email: email,
                        uID: uID,
                        balance: 100.00 // জয়েনিং বোনাস ১০০ টাকা (ঐচ্ছিক)
                    });
                }
            } catch (error) {
                alert(error.message);
            }
        }

        // ইউজার লগইন আছে কি না তা চেক করা
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('lobby-screen').style.display = 'block';
                loadUserData(user.uid);
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('lobby-screen').style.display = 'none';
            }
        });

        function loadUserData(uid) {
            database.ref('users/' + uid).on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    document.getElementById('user-id-display').innerText = "ID: " + data.uID;
                    document.getElementById('user-balance-display').innerText = "₹ " + parseFloat(data.balance).toFixed(2);
                    // গেম পেজের জন্য uID সেভ করে রাখা
                    localStorage.setItem('uID', uid); 
                }
            });
        }

        function logout() {
            auth.signOut();
        }
    </script>
</body>
</html>
