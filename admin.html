<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinGo Master Admin - Live Control</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #0f0f0f; color: white; padding: 20px; }
        .admin-wrapper { max-width: 1000px; margin: 0 auto; }
        h2 { color: #ffc107; margin-bottom: 20px; text-align: center; border-bottom: 2px solid #333; padding-bottom: 10px; }
        
        .live-status { background: #222; padding: 15px; border-radius: 12px; margin-bottom: 20px; display: flex; justify-content: space-around; align-items: center; border: 1px dashed #444; }
        .status-box { text-align: center; }
        .status-box p { font-size: 12px; color: #888; text-transform: uppercase; }
        .status-box h3 { color: #ffc107; font-size: 20px; }

        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; }
        .btn-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 15px; }
        .num-btn { padding: 15px 10px; border-radius: 8px; border: 1px solid #444; background: #222; color: white; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 16px; }
        .num-btn:hover { border-color: #ffc107; }
        .num-btn.active { background: #ffc107; color: black; border-color: #ffc107; box-shadow: 0 0 15px rgba(255,193,7,0.4); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
        th { color: #888; }
        .status-text { font-size: 14px; margin-top: 15px; text-align: center; display: block; font-weight: bold; }
        .lock-warning { color: #f44336; font-size: 12px; margin-top: 5px; display: none; }
        .server-tag { background: #4caf50; color: white; font-size: 10px; padding: 2px 8px; border-radius: 10px; margin-left: 10px; vertical-align: middle; }
    </style>
</head>
<body>

<div class="admin-wrapper">
    <h2><i class="fa-solid fa-user-shield"></i> BDG Master Admin <span class="server-tag">SERVER ACTIVE</span></h2>

    <div class="live-status">
        <div class="status-box">
            <p>Current Period</p>
            <h3 id="admin-period">Loading...</h3>
        </div>
        <div class="status-box">
            <p>Time Left</p>
            <h3 id="admin-timer" style="color: #ffc107;">00:00</h3>
        </div>
    </div>

    <div class="admin-grid">
        <div class="card">
            <h3><i class="fa-solid fa-gamepad"></i> Next Result Control</h3>
            <p style="font-size: 11px; color: #888; margin-top: 5px;">নম্বর সিলেক্ট করলে সেটি যাবে, না করলে অটো র‍্যান্ডম হবে।</p>
            
            <div class="btn-grid">
                <script>
                    for(let i=0; i<=9; i++) {
                        document.write(`<button class="num-btn" id="btn-${i}" onclick="setManualResult(${i})">${i}</button>`);
                    }
                </script>
            </div>
            
            <span id="sync-status" class="status-text">Checking Database...</span>
            <p id="lock-msg" class="lock-warning">⚠️ Syncing Result for next round...</p>
            
            <button onclick="clearManual()" style="margin-top:20px; width:100%; padding:12px; background:none; border:1px solid #ffc107; color:#ffc107; border-radius:8px; cursor:pointer; font-weight:bold;">
                <i class="fa-solid fa-rotate"></i> Reset to Auto
            </button>
        </div>

        <div class="card">
            <h3><i class="fa-solid fa-bell"></i> Live Activity</h3>
            <table>
                <thead>
                    <tr><th>User ID</th><th>Bet</th><th>Amount</th><th>Status</th></tr>
                </thead>
                <tbody id="request-table">
                    <tr><td colspan="4" style="text-align:center; color:#555; padding: 20px;">System is handling results automatically.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD2It_WJyq3VzjGFE0tqlm_Wac7CHEb2LI",
        authDomain: "bdg-game-35af2.firebaseapp.com",
        databaseURL: "https://bdg-game-35af2-default-rtdb.firebaseio.com",
        projectId: "bdg-game-35af2",
        storageBucket: "bdg-game-35af2.firebasestorage.app",
        messagingSenderId: "1040854462703",
        appId: "1:1040854462703:web:4875b19f420c57dafbeb1a"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let manualSelection = null;
    let lastProcessedPeriod = "";

    function startAdminSystem() {
        setInterval(() => {
            const now = new Date();
            const seconds = now.getSeconds();
            const remaining = (seconds >= 30) ? 60 - seconds : 30 - seconds;
            
            const dateStr = now.toISOString().slice(0, 10).replace(/-/g, "");
            const currentPeriod = dateStr + Math.floor(((now.getHours() * 3600) + (now.getMinutes() * 60) + seconds) / 30);
            
            document.getElementById('admin-period').innerText = currentPeriod;
            document.getElementById('admin-timer').innerText = "00:" + (remaining < 10 ? "0" + remaining : remaining);

            // ১. টাইমার যখন ২ সেকেন্ডে আসবে, তখন রেজাল্ট ডাটাবেসে পুশ করবে
            if (remaining === 2 && lastProcessedPeriod !== currentPeriod) {
                lastProcessedPeriod = currentPeriod;
                processFinalResult();
            }

            // লক ওয়ার্নিং
            if(remaining <= 5) {
                document.getElementById('lock-msg').style.display = 'block';
            } else {
                document.getElementById('lock-msg').style.display = 'none';
            }
        }, 1000);
    }

    // রেজাল্ট প্রসেস করার ফাংশন (অটো + ম্যানুয়াল)
    function processFinalResult() {
        let finalNum;
        if (manualSelection !== null) {
            finalNum = manualSelection;
            document.getElementById('sync-status').innerHTML = `<span style="color:#ffc107;">🔥 Manual Result Sent: ${finalNum}</span>`;
        } else {
            finalNum = Math.floor(Math.random() * 10);
            document.getElementById('sync-status').innerHTML = `<span style="color:#4caf50;">✅ Auto Result Sent: ${finalNum}</span>`;
        }

        // ডাটাবেসে পাঠানো
        database.ref('gameControl/currentResult').set({
            number: finalNum,
            period: document.getElementById('admin-period').innerText,
            time: Date.now()
        });

        // রাউন্ড শেষে ম্যানুয়াল সিলেকশন রিসেট
        setTimeout(() => {
            clearManual();
        }, 3000);
    }

    function setManualResult(num) {
        const remaining = parseInt(document.getElementById('admin-timer').innerText.split(":")[1]);
        if(remaining <= 5) {
            alert("Time over! Wait for next round.");
            return;
        }
        manualSelection = num;
        document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + num).classList.add('active');
        document.getElementById('sync-status').innerHTML = `<span style="color:#ffc107;">Selected: ${num} (Will be sent at 00:02)</span>`;
    }

    function clearManual() {
        manualSelection = null;
        document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('sync-status').innerHTML = `<span style="color:#4caf50;">✅ Ready for Next Round</span>`;
    }

    window.onload = startAdminSystem;
</script>

</body>
</html>
