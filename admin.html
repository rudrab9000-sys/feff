<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinGo Master Admin - Live Control</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #0f0f0f; color: white; padding: 20px; }
        .admin-wrapper { max-width: 1000px; margin: 0 auto; }
        h2 { color: #ffc107; margin-bottom: 20px; text-align: center; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; }
        .btn-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 15px; }
        .num-btn { padding: 10px; border-radius: 8px; border: 1px solid #444; background: #222; color: white; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .num-btn.active { background: #ffc107; color: black; border-color: #ffc107; box-shadow: 0 0 10px #ffc107; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
        th { color: #888; }
        .status-text { font-size: 12px; margin-top: 10px; text-align: center; display: block; }
    </style>
</head>
<body>

<div class="admin-wrapper">
    <h2><i class="fa-solid fa-user-shield"></i> BDG Master Admin (LIVE)</h2>

    <div class="admin-grid">
        <div class="card">
            <h3><i class="fa-solid fa-gamepad"></i> Next Result Control</h3>
            <p style="font-size: 11px; color: #888; margin-bottom: 10px;">টাইমার শেষ হওয়ার আগে যেকোনো নাম্বারে ক্লিক করুন।</p>
            <div class="btn-grid">
                <script>
                    for(let i=0; i<=9; i++) {
                        document.write(`<button class="num-btn" id="btn-${i}" onclick="setNextResult(${i})">${i}</button>`);
                    }
                </script>
            </div>
            <span id="sync-status" class="status-text">Checking Database...</span>
            <button onclick="clearNext()" style="margin-top:15px; width:100%; padding:10px; background:none; border:1px solid red; color:red; border-radius:8px; cursor:pointer; font-weight:bold;">Reset to Auto (Random)</button>
        </div>

        <div class="card">
            <h3><i class="fa-solid fa-bell"></i> Pending Requests</h3>
            <table>
                <thead>
                    <tr><th>User</th><th>Type</th><th>Amount</th><th>Action</th></tr>
                </thead>
                <tbody id="request-table">
                    <tr><td colspan="4" style="text-align:center; color:#555;">No pending requests</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // --- Firebase Configuration (আপনার ডাটাবেসের জন্য) ---
    const firebaseConfig = {
        apiKey: "AIzaSyD2It_WJyq3VzjGFE0tqlm_Wac7CHEb2LI",
        authDomain: "bdg-game-35af2.firebaseapp.com",
        databaseURL: "https://bdg-game-35af2-default-rtdb.firebaseio.com",
        projectId: "bdg-game-35af2",
        storageBucket: "bdg-game-35af2.firebasestorage.app",
        messagingSenderId: "1040854462703",
        appId: "1:1040854462703:web:4875b19f420c57dafbeb1a"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // ১. ডাটাবেস থেকে বর্তমান "Hacked Result" চেক করা
    database.ref('gameControl/nextResult').on('value', (snapshot) => {
        const val = snapshot.val();
        document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('active'));
        const status = document.getElementById('sync-status');
        
        if (val !== null) {
            document.getElementById('btn-' + val).classList.add('active');
            status.innerHTML = `<span style="color:#ffc107;">🔥 Next Result is Hacked to: ${val}</span>`;
        } else {
            status.innerHTML = `<span style="color:#4caf50;">✅ Running on Auto Mode</span>`;
        }
    });

    // ২. এডমিন প্যানেল থেকে রেজাল্ট ডাটাবেসে সেট করা
    function setNextResult(num) {
        database.ref('gameControl/nextResult').set(num)
        .then(() => {
            console.log("Result set to " + num);
        })
        .catch((err) => {
            alert("Database Error: " + err.message);
        });
    }

    // ৩. রেজাল্ট ক্লিয়ার করা (অটো মুড)
    function clearNext() {
        database.ref('gameControl/nextResult').remove()
        .then(() => {
            alert("Success: Game is now back to Auto Mode!");
        });
    }

</script>

</body>
</html>
