<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinGo Ultimate Live - BDG</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: #333; display: flex; justify-content: center; min-height: 100vh; }
        .wrapper { width: 375px; background-color: #1a1a1a; color: white; height: 100vh; overflow-y: auto; position: relative; scrollbar-width: none; }
        .header { background: #222; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 10; }
        .balance-card { background: linear-gradient(135deg, #d32f2f, #ff5252); margin: 15px; border-radius: 15px; padding: 20px; text-align: center; box-shadow: 0 8px 20px rgba(211,47,47,0.3); }
        .timer-container { background: #222; margin: 15px; border-radius: 12px; padding: 15px; display: flex; justify-content: space-between; border: 1px solid #333; }
        .time-display { font-size: 28px; font-weight: bold; color: #ffc107; }
        .lockdown { color: #f44336 !important; animation: blink 0.8s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }
        .color-btns { display: flex; justify-content: space-around; padding: 10px 15px; }
        .c-btn { border: none; padding: 12px; border-radius: 5px 20px; color: white; font-weight: bold; cursor: pointer; width: 30%; font-size: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .green { background: #4caf50; } .violet { background: #9c27b0; } .red { background: #f44336; }
        .number-grid { background: #222; margin: 15px; padding: 15px; border-radius: 12px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .num-btn { background: #333; border: 2px solid #444; border-radius: 50%; width: 55px; height: 55px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; font-weight: bold; font-size: 18px; }
        .n0, .n5 { border-color: #9c27b0; color: #9c27b0; }
        .n1, .n3, .n7, .n9 { border-color: #4caf50; color: #4caf50; }
        .n2, .n4, .n6, .n8 { border-color: #f44336; color: #f44336; }
        .size-btns { display: flex; justify-content: space-around; padding: 10px 15px; }
        .s-btn { border: none; padding: 12px; border-radius: 20px 5px; color: white; font-weight: bold; cursor: pointer; width: 45%; font-size: 16px; }
        .big { background: #ffa000; } .small { background: #3a7bd5; }
        .history-section { background: #222; margin-top: 20px; border-radius: 20px 20px 0 0; padding: 10px; min-height: 400px; }
        .tabs { display: flex; border-bottom: 1px solid #333; margin-bottom: 10px; }
        .tab { flex: 1; text-align: center; padding: 15px; color: #888; font-weight: bold; cursor: pointer; }
        .tab.active { color: #ffc107; border-bottom: 3px solid #ffc107; }
        table { width: 100%; color: #ccc; text-align: center; font-size: 12px; border-collapse: collapse; }
        td, th { padding: 12px 5px; border-bottom: 1px solid #2a2a2a; }
        .res-ball { width: 25px; height: 25px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        .bg-red { background-color: #f44336; } .bg-green { background-color: #4caf50; }
        .bg-n0 { background: linear-gradient(135deg, #9c27b0 50%, #f44336 50%); }
        .bg-n5 { background: linear-gradient(135deg, #9c27b0 50%, #4caf50 50%); }
        .res-popup { display: none; position: fixed; top: 0; width: 375px; height: 100%; background: rgba(0,0,0,0.9); z-index: 200; flex-direction: column; justify-content: center; align-items: center; }
        .res-card { background: #222; padding: 30px; border-radius: 20px; text-align: center; border: 1px solid #ffc107; transform: scale(0.5); transition: 0.3s; }
        .res-card.show { transform: scale(1); }
    </style>
</head>
<body>

    <div class="wrapper">
        <header class="header">
            <b>WinGo 30s Live</b>
            <span id="display-uid" style="font-size: 10px; color: #aaa;">ID: Loading...</span>
        </header>
        <div class="balance-card">
            <p>Wallet Balance</p>
            <h1>₹ <span id="balance">0.00</span></h1>
        </div>
        <div class="timer-container">
            <div><p style="font-size:12px; color:#aaa;">Period Number</p><h4 id="period">Loading...</h4></div>
            <div style="text-align:right;"><p style="font-size:12px; color:#aaa;">Time</p><div class="time-display" id="timer">00:00</div></div>
        </div>

        <div class="color-btns">
            <button class="c-btn green" onclick="openBet('Green')">Green</button>
            <button class="c-btn violet" onclick="openBet('Violet')">Violet</button>
            <button class="c-btn red" onclick="openBet('Red')">Red</button>
        </div>
        <div class="number-grid">
            <script>for(let i=0; i<=9; i++) document.write(`<button class="num-btn n${i}" onclick="openBet('${i}')">${i}</button>`);</script>
        </div>
        <div class="size-btns">
            <button class="s-btn big" onclick="openBet('Big')">Big</button>
            <button class="s-btn small" onclick="openBet('Small')">Small</button>
        </div>

        <div class="history-section">
            <div class="tabs">
                <div class="tab active" onclick="switchTab('game', this)">Game History</div>
                <div class="tab" onclick="switchTab('my', this)">My History</div>
            </div>
            <div id="game-list"><table><thead><tr><th>Period</th><th>Num</th><th>Size</th><th>Color</th></tr></thead><tbody id="game-records"></tbody></table></div>
            <div id="my-list" style="display:none;"><table><thead><tr><th>Period</th><th>Bet</th><th>Amt</th><th>Res</th></tr></thead><tbody id="my-records"></tbody></table></div>
        </div>
    </div>

    <div id="modal" style="display:none; position:fixed; top:0; width:375px; height:100%; background:rgba(0,0,0,0.8); z-index:100; justify-content:center; align-items:flex-end;">
        <div style="background:white; color:black; width:100%; border-radius:20px 20px 0 0; padding:20px;">
            <h3 id="bet-title">Select: Green</h3>
            <input type="number" id="custom-amt" value="10" style="width:100%; padding:10px; margin:15px 0; font-size:18px;">
            <button onclick="confirmBet()" style="width:100%; background:#d32f2f; color:white; padding:15px; border:none; border-radius:10px; font-weight:bold;">Confirm</button>
            <button onclick="closeModal()" style="width:100%; background:none; border:none; color:#888; margin-top:10px;">Cancel</button>
        </div>
    </div>

    <div id="res-popup" class="res-popup">
        <div class="res-card" id="res-card">
            <h2 id="res-msg">Congratulations</h2>
            <h1 id="res-amount">+ ₹0.00</h1>
            <button onclick="closeResult()" style="background:#ffc107; padding:10px 20px; border:none; border-radius:10px;">OK</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD2It_WJyq3VzjGFE0tqlm_Wac7CHEb2LI",
            authDomain: "bdg-game-35af2.firebaseapp.com",
            databaseURL: "https://bdg-game-35af2-default-rtdb.firebaseio.com",
            projectId: "bdg-game-35af2",
            storageBucket: "bdg-game-35af2.firebasestorage.app",
            messagingSenderId: "1040854462703",
            appId: "1:1040854462703:web:4875b19f420c57dafbeb1a"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // ইউজার আইডি সেটআপ
        let userID = localStorage.getItem('uID') || "UID" + Math.floor(1000 + Math.random() * 9000);
        localStorage.setItem('uID', userID);
        document.getElementById('display-uid').innerText = "ID: " + userID;

        let balance = 0;
        let myHistory = JSON.parse(localStorage.getItem('myH')) || [];
        let gameHistory = [];
        let isLockdown = false;
        let selectedBet = "";

        // রিয়েল-টাইম ব্যালেন্স সিঙ্ক (অ্যাডমিন আপডেট করলে এখানে অটো বদলে যাবে)
        function syncUserBalance() {
            database.ref('users/' + userID + '/balance').on('value', (snapshot) => {
                if (snapshot.exists()) {
                    balance = parseFloat(snapshot.val());
                } else {
                    // প্রথমবার ইউজার এলে ডাটাবেসে নতুন এন্ট্রি তৈরি হবে
                    database.ref('users/' + userID).set({ id: userID, balance: 1000.00 });
                    balance = 1000.00;
                }
                updateUI();
            });
        }

        function generatePeriodID() {
            const now = new Date();
            const dateStr = now.getUTCFullYear().toString() + (now.getUTCMonth() + 1).toString().padStart(2, '0') + now.getUTCDate().toString().padStart(2, '0');
            const totalSeconds = (now.getUTCHours() * 3600) + (now.getUTCMinutes() * 60) + now.getUTCSeconds();
            return dateStr + Math.floor(totalSeconds / 30).toString().padStart(4, '0');
        }

        function syncHistory() {
            database.ref('gameControl/history').limitToLast(20).on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    gameHistory = Object.values(data).reverse();
                    renderTables();
                }
            });
        }

        function startTimer() {
            setInterval(() => {
                const now = new Date();
                const seconds = now.getUTCSeconds();
                const s = (seconds >= 30) ? 60 - seconds : 30 - seconds;
                const pID = generatePeriodID();
                
                document.getElementById('period').innerText = pID;
                document.getElementById('timer').innerText = "00:" + (s < 10 ? "0" + s : s);

                if (s <= 5) {
                    isLockdown = true;
                    document.getElementById('timer').classList.add('lockdown');
                } else {
                    isLockdown = false;
                    document.getElementById('timer').classList.remove('lockdown');
                }

                if (s === 1) {
                    setTimeout(() => checkBetResult(pID), 2500);
                }
            }, 1000);
        }

        async function checkBetResult(pID) {
            const snapshot = await database.ref('gameControl/history/' + pID).get();
            if (snapshot.exists()) {
                const res = snapshot.val();
                const num = res.n;
                const size = res.s;
                const color = res.c;

                let winTotal = 0, hasBet = false, winFlag = false;
                myHistory.forEach(bet => {
                    if(bet.p == pID && bet.res === "Processing") {
                        hasBet = true;
                        let win = (bet.sel === color || bet.sel === num.toString() || bet.sel === size);
                        if(win) {
                            let mult = isNaN(bet.sel) ? 1.96 : 9;
                            winTotal += bet.amt * 0.98 * mult;
                            bet.res = "WIN"; bet.color = "#4caf50"; winFlag = true;
                        } else {
                            bet.res = "LOSS"; bet.color = "#f44336";
                        }
                    }
                });

                if(hasBet) {
                    const newBal = balance + winTotal;
                    database.ref('users/' + userID + '/balance').set(newBal); // ডাটাবেসে উইন ব্যালেন্স আপডেট
                    showResultPopup(winFlag, winTotal);
                }
            }
        }

        function updateUI() {
            document.getElementById('balance').innerText = balance.toFixed(2);
            localStorage.setItem('bal', balance);
            localStorage.setItem('myH', JSON.stringify(myHistory));
            renderTables();
        }

        function renderTables() {
            document.getElementById('game-records').innerHTML = gameHistory.map(g => {
                let ballClass = g.n === 0 ? "bg-n0" : (g.n === 5 ? "bg-n5" : (g.n % 2 === 0 ? "bg-red" : "bg-green"));
                return `<tr><td>${g.p}</td><td><div class="res-ball ${ballClass}">${g.n}</div></td><td>${g.s}</td><td>${g.c}</td></tr>`;
            }).join('');
            document.getElementById('my-records').innerHTML = myHistory.map(h => `<tr><td>${h.p}</td><td>${h.sel}</td><td>${h.amt}</td><td style="color:${h.color}">${h.res}</td></tr>`).join('');
        }

        function openBet(val) { if(isLockdown) return; selectedBet = val; document.getElementById('bet-title').innerText = "Select: " + val; document.getElementById('modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        
        function confirmBet() {
            let amt = parseFloat(document.getElementById('custom-amt').value);
            let currentP = document.getElementById('period').innerText;
            if (balance >= amt && amt > 0) {
                const newBal = balance - amt;
                database.ref('users/' + userID + '/balance').set(newBal); // বাজি ধরার সাথে সাথে ব্যালেন্স কাটা যাবে
                myHistory.unshift({ p: currentP, sel: selectedBet, amt: amt, res: "Processing", color: "#ffc107" });
                closeModal();
            } else {
                alert("Insufficient Balance!");
            }
        }

        function showResultPopup(win, amt) {
            document.getElementById('res-msg').innerText = win ? "Congratulations" : "Better Luck Next Time";
            document.getElementById('res-amount').innerText = (win ? "+ ₹" : "₹") + amt.toFixed(2);
            document.getElementById('res-popup').style.display = 'flex';
            setTimeout(() => document.getElementById('res-card').classList.add('show'), 10);
        }
        function closeResult() { document.getElementById('res-card').classList.remove('show'); setTimeout(() => document.getElementById('res-popup').style.display = 'none', 300); }
        function switchTab(type, el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); el.classList.add('active');
            document.getElementById('game-list').style.display = type === 'game' ? 'block' : 'none';
            document.getElementById('my-list').style.display = type === 'my' ? 'block' : 'none';
        }

        window.onload = () => { startTimer(); syncHistory(); syncUserBalance(); };
    </script>
</body>
</html>
